<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MMUHUB Homepage</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
</head>
<body>
    <div class="app-background">
        <div class="main-container">
            <header>
                <div class="logo">
                    <span class="red">MM</span><span class="blue">U</span><span class="green">HUB</span>
                </div>
                <div class="tabs">
                    <div class="tab-item active">For you</div>
                    <div class="tab-item">Following</div>
                </div>
                <hr class="header-line">
            </header>

            <div class="content-wrapper">
                <aside class="sidebar">
                    <div class="icon-group">
                        <div class="icon-circle" data-tooltip="Search"><i class="bi bi-search"></i></div>
                        <div class="icon-circle" data-tooltip="Home"><i class="bi bi-house"></i></div>
                        <div class="icon-circle" data-tooltip="Trending"><i class="bi bi-fire"></i></div>
                        <div class="icon-circle" data-tooltip="Activity"><i class="bi bi-heart"></i></div>
                        <div class="icon-circle" data-tooltip="Profile"><i class="bi bi-person"></i></div>
                        <div class="icon-circle" data-tooltip="Map"><i class="bi bi-geo-alt"></i></div>
                    </div>
                </aside>

                <main class="content-area">
                    <div class="plus-icon">
                        <i class="bi bi-plus-lg"></i>
                    </div>
                </main>
            </div>
        </div>
    </div>
</body>
</html>
