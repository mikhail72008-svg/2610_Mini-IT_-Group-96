<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - MMUHUB</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="app-background">
        <div class="auth-card">
            <div class="logo" style="text-align: center;">
                <span class="red">MM</span><span class="blue">U</span><span class="green">HUB</span>
            </div>
            <h2>Login</h2>
            <form>
                <input type="email" placeholder="Email" class="auth-input">
                <input type="password" placeholder="Password" class="auth-input">
                <button type="submit" class="auth-button">Login</button>
            </form>
            <p class="auth-footer">Don't have an account? <a href="register.html">Register</a></p>
        </div>
    </div>
</body>
</html>
